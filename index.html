<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-100" x-data="shop()" x-cloak>

    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="font-black italic">CRATE DROP <span class="text-blue-500 not-italic font-bold text-xs tracking-widest">COLLECTIVE</span></div>
            <button @click="cartOpen = true" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">
                CART (₱<span x-text="getCartTotal()"></span>)
            </button>
        </div>
    </nav>

    <div class="bg-white border-b p-4 overflow-x-auto whitespace-nowrap flex gap-2">
        <template x-for="cat in ['All Products', 'Pokemon TCG', 'Gundam TCG', 'Magic The Gathering']" :key="cat">
            <button @click="currentCategory = cat" 
                    :class="currentCategory === cat ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'"
                    class="px-4 py-1 rounded-full text-[10px] font-bold uppercase" x-text="cat"></button>
        </template>
    </div>

    <main class="container mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <template x-for="product in filteredProducts()" :key="product.id">
                <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-200 flex flex-col">
                    <img :src="product.image" class="w-full aspect-square object-contain mb-3">
                    <h3 class="font-bold text-xs h-8 overflow-hidden mb-2" x-text="product.name"></h3>
                    <p class="text-lg font-black mb-3">₱<span x-text="product.price.toLocaleString()"></span></p>
                    
                    <button @click="addToCart(product)" 
                            class="mt-auto w-full bg-black text-white py-2 rounded-lg text-[10px] font-bold uppercase active:scale-95 transition-transform">
                        Add to Crate
                    </button>
                </div>
            </template>
        </div>
    </main>

    <div x-show="cartOpen" class="fixed inset-0 z-[60]">
        <div class="absolute inset-0 bg-black/50" @click="cartOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-80 bg-white p-6 shadow-2xl flex flex-col">
            <h2 class="text-xl font-black mb-6 italic">YOUR CRATE</h2>
            <div class="flex-1 overflow-y-auto">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <div class="text-[10px] font-bold max-w-[150px]" x-text="item.name"></div>
                        <div class="font-black text-xs">₱<span x-text="item.price.toLocaleString()"></span></div>
                        <button @click="cart.splice(index, 1)" class="text-red-500 text-xs">×</button>
                    </div>
                </template>
            </div>
            <div class="mt-4 pt-4 border-t">
                <div class="flex justify-between font-black mb-4">
                    <span>TOTAL:</span>
                    <span>₱<span x-text="getCartTotal()"></span></span>
                </div>
                <button @click="checkout()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xs uppercase">Checkout Messenger</button>
            </div>
        </div>
    </div>

    <script>
        function shop() {
            return {
                cartOpen: false,
                currentCategory: 'All Products',
                cart: [],
                products: [
                    { id: 1, name: "Phantasmal Flames Booster Box", category: "Pokemon TCG", price: 18000, image: "https://tcgplayer-cdn.tcgplayer.com/product/654137_in_1000x1000.jpg" },
                    { id: 2, name: "GCG Newtype Rising [GD-01] Case", category: "Gundam TCG", price: 34800, image: "https://www.gundam-gcg.com/gcg/bccard/asia-en/news/2025/05/02/8255768kkzrLLWCW/thumbnail_box_jp.webp" },
                    { id: 3, name: "GCG Dual Impact [GD-02] Case", category: "Gundam TCG", price: 34800, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSr8DrGGHzKuKHycM2YMFp8JnBPh3Gb4zmAAueM1bpCVA&s=10" },
                    { id: 4, name: "Lorwyn Eclipsed Play Booster Box", category: "Magic The Gathering", price: 8500, image: "https://m.media-amazon.com/images/I/71fPQsW9USL.jpg" }
                ],
                filteredProducts() {
                    if (this.currentCategory === 'All Products') return this.products;
                    return this.products.filter(p => p.category === this.currentCategory);
                },
                addToCart(p) {
                    this.cart.push(p);
                },
                getCartTotal() {
                    let total = 0;
                    this.cart.forEach(i => total += i.price);
                    return total.toLocaleString();
                },
                checkout() {
                    let text = "ORDER:\n";
                    this.cart.forEach(i => text += "- " + i.name + "\n");
                    navigator.clipboard.writeText(text);
                    alert("Order copied! Open Messenger.");
                    window.open("https://m.me/cratedropcollective", "_blank");
                }
            }
        }
    </script>
</body>
</html>
