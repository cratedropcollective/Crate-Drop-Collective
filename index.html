<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Single Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans" x-data="shop()">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter">MY <span class="text-blue-400">TCG</span> SHOP</h1>
            <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg flex items-center">
                <i class="fas fa-shopping-cart mr-2"></i>
                Cart (<span x-text="cart.length"></span>) — $<span x-text="total"></span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <template x-for="product in products" :key="product.id">
                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow border border-gray-200">
                    <img :src="product.image" :alt="product.name" class="w-full h-64 object-contain p-4 bg-gray-50">
                    <div class="p-4">
                        <span class="text-xs font-semibold text-blue-600 uppercase tracking-wider" x-text="product.set"></span>
                        <h2 class="text-lg font-bold text-gray-800" x-text="product.name"></h2>
                        <p class="text-gray-500 text-sm mb-4" x-text="product.condition"></p>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-bold text-slate-900">$<span x-text="product.price"></span></span>
                            <button @click="addToCart(product)" class="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition">
                                Add to Basket
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="cartOpen" class="fixed inset-0 z-[60] overflow-hidden" style="display: none;">
        <div class="absolute inset-0 bg-black bg-opacity-50" @click="cartOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Your Basket</h2>
                <button @click="cartOpen = false" class="text-gray-500 hover:text-black text-2xl">&times;</button>
            </div>

            <div class="space-y-4">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center justify-between border-bottom pb-4 border-b">
                        <div class="flex items-center">
                            <img :src="item.image" class="w-12 h-12 object-contain mr-4">
                            <div>
                                <p class="font-bold text-sm" x-text="item.name"></p>
                                <p class="text-xs text-gray-500" x-text="item.condition"></p>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <span class="font-bold mr-4">$<span x-text="item.price"></span></span>
                            <button @click="removeFromCart(index)" class="text-red-500 hover:text-red-700">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </template>
            </div>

            <div class="mt-8 border-t pt-6">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total:</span>
                    <span>$<span x-text="total"></span></span>
                </div>
                <button @click="checkout()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg">
                    Order via WhatsApp
                </button>
                <p class="text-center text-gray-500 text-xs mt-4">Manual payment will be arranged via chat.</p>
            </div>
        </div>
    </div>

    <script>
        function shop() {
            return {
                cartOpen: false,
                cart: [],
                // --- MANUALLY ADD YOUR PRODUCTS HERE ---
                products: [
                    {
                        id: 1,
                        name: "Charizard G Level X",
                        set: "Supreme Victors",
                        price: 120.00,
                        condition: "Near Mint",
                        image: "https://images.pokemontcg.io/pl3/143_hires.png"
                    },
                    {
                        id: 2,
                        name: "Gengar VMAX (Alt Art)",
                        set: "Fusion Strike",
                        price: 250.00,
                        condition: "Mint",
                        image: "https://images.pokemontcg.io/swsh8/271_hires.png"
                    },
                    {
                        id: 3,
                        name: "Umbreon Star",
                        set: "Celebrations",
                        price: 45.00,
                        condition: "Lightly Played",
                        image: "https://images.pokemontcg.io/cel25/17_hires.png"
                    }
                ],
                // ---------------------------------------
                addToCart(product) {
                    this.cart.push(product);
                },
                removeFromCart(index) {
                    this.cart.splice(index, 1);
                },
                get total() {
                    return this.cart.reduce((sum, item) => sum + item.price, 0).toFixed(2);
                },
                checkout() {
                    if(this.cart.length === 0) return alert("Your basket is empty!");
                    
                    let phone = "1234567890"; // REPLACE WITH YOUR PHONE NUMBER (International format, no +)
                    let message = "Hello! I'd like to place an order:%0A%0A";
                    
                    this.cart.forEach(item => {
                        message += `- ${item.name} (${item.condition}): $${item.price}%0A`;
                    });
                    
                    message += `%0A*TOTAL: $${this.total}*`;
                    window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
                }
            }
        }
    </script>
</body>
</html>
