<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | TCG Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-cloak>

    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-xs font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </div>
            <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-full flex items-center transition-all">
                <i class="fas fa-shopping-cart mr-2 text-sm"></i>
                <span class="font-bold text-sm">Cart (<span x-text="cart.length"></span>) — ₱<span x-text="total"></span></span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <template x-for="product in products" :key="product.id">
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden hover:shadow-xl transition-all group">
                    <div class="relative aspect-square bg-gray-100 flex items-center justify-center p-4">
                        <img :src="product.image" :alt="product.name" class="max-h-full object-contain transform group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-4 md:p-6">
                        <p class="text-[10px] font-black text-blue-600 uppercase mb-1" x-text="product.set"></p>
                        <h2 class="text-sm md:text-base font-bold leading-tight mb-2 h-10 overflow-hidden" x-text="product.name"></h2>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold" x-text="product.condition"></p>
                                <p class="text-lg font-black">₱<span x-text="product.price.toLocaleString()"></span></p>
                            </div>
                            <button @click="addToCart(product)" 
                                    :class="product.justAdded ? 'bg-green-500' : 'bg-slate-900 hover:bg-blue-600'"
                                    class="text-white px-3 py-2 rounded-xl transition-colors text-xs font-bold">
                                <span x-show="!product.justAdded"><i class="fas fa-plus"></i> Add</span>
                                <span x-show="product.justAdded"><i class="fas fa-check"></i> Added!</span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="cartOpen" class="fixed inset-0 z-[60]" style="display: none;">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="cartOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-slate-900">YOUR BASKET</h2>
                <button @click="cartOpen = false" class="text-3xl">&times;</button>
            </div>

            <div class="space-y-6">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center justify-between border-b border-gray-100 pb-4">
                        <div class="flex items-center">
                            <img :src="item.image" class="w-12 h-12 object-contain mr-4 bg-gray-50 p-1 rounded">
                            <div>
                                <p class="font-bold text-sm leading-tight text-slate-800" x-text="item.name"></p>
                                <p class="text-[10px] font-bold text-blue-600 uppercase" x-text="item.condition"></p>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <span class="font-bold text-sm mr-4 text-slate-900">₱<span x-text="item.price.toLocaleString()"></span></span>
                            <button @click="removeFromCart(index)" class="text-gray-300 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </template>
            </div>

            <div class="mt-10" x-show="cart.length > 0">
                <div class="flex justify-between text-2xl font-black mb-8">
                    <span>Total:</span>
                    <span>₱<span x-text="total"></span></span>
                </div>
                <button @click="checkout()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black hover:bg-blue-700 transition-transform active:scale-95 shadow-lg shadow-blue-200">
                    ORDER VIA FACEBOOK
                </button>
                <p class="text-center text-[10px] text-gray-400 mt-4 font-bold uppercase tracking-widest">Order list will be copied to clipboard</p>
            </div>
            
            <div x-show="cart.length === 0" class="text-center py-20 text-gray-400">
                <i class="fas fa-shopping-bag text-4xl mb-4"></i>
                <p>Basket is empty.</p>
            </div>
        </div>
    </div>

    <script>
        function shop() {
            return {
                cartOpen: false,
                cart: [],
                
                // ==========================================
                // 📝 TEMPLATE: COPY & PASTE ONE BLOCK BELOW TO ADD A PRODUCT
                /* {
                    id: 4,
                    name: "Card Name Here",
                    set: "Set Name",
                    price: 1000,
                    condition: "NM",
                    image: "https://link-to-image.png",
                    justAdded: false
                },
                */
                // ==========================================
                products: [
                    {
                        id: 1,
                        name: "Charizard G Level X",
                        set: "Supreme Victors",
                        price: 6500,
                        condition: "Near Mint",
                        image: "https://images.pokemontcg.io/pl3/143_hires.png",
                        justAdded: false
                    },
                    {
                        id: 2,
                        name: "Gengar VMAX (Alt Art)",
                        set: "Fusion Strike",
                        price: 14000,
                        condition: "Mint",
                        image: "https://images.pokemontcg.io/swsh8/271_hires.png",
                        justAdded: false
                    },
                    {
                        id: 3,
                        name: "Umbreon Star",
                        set: "Celebrations",
                        price: 2500,
                        condition: "Near Mint",
                        image: "https://images.pokemontcg.io/cel25/17_hires.png",
                        justAdded: false
                    }
                ],
                // ==========================================

                addToCart(product) {
                    this.cart.push(product);
                    product.justAdded = true;
                    setTimeout(() => { product.justAdded = false; }, 2000);
                },
                removeFromCart(index) {
                    this.cart.splice(index, 1);
                },
                get total() {
                    return this.cart.reduce((sum, item) => sum + item.price, 0).toLocaleString();
                },
                async checkout() {
                    let orderSummary = "🛒 ORDER FROM CRATE DROP COLLECTIVE\n\n";
                    this.cart.forEach(item => {
                        orderSummary += `• ${item.name} (${item.condition}) - ₱${item.price.toLocaleString()}\n`;
                    });
                    orderSummary += `\nTOTAL: ₱${this.total}`;

                    try {
                        await navigator.clipboard.writeText(orderSummary);
                        alert("Order list copied! Now opening Facebook. Just PASTE the message in the chat.");
                        window.open("https://www.facebook.com/share/1AaiN79gTS/?mibextid=wwXIfr", "_blank");
                    } catch (err) {
                        window.open("https://www.facebook.com/share/1AaiN79gTS/?mibextid=wwXIfr", "_blank");
                    }
                }
            }
        }
    </script>
</body>
</html>
